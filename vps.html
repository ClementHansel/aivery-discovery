<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS Analysis | AVRY Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #14161e; --accent: #00f2ff; --text: #e0e0e0; --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .breadcrumb { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 20px; }
        .nav-item { padding: 12px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; border-radius: 8px; margin-bottom: 4px; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(255,255,255,0.02); }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; color: #fff; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 13px; color: #666; margin-bottom: 20px; }
        .tag { position: absolute; top: 15px; right: 15px; font-size: 10px; background: rgba(0, 242, 255, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); font-weight: 300; letter-spacing: 3px; font-size: 20px; margin-bottom: 40px;">AVRY</h2>
        <nav>
            <a href="index.html" class="nav-item"><i data-feather="grid"></i> Dashboard</a>
            <div style="margin: 20px 0 10px 12px; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px;">Modules</div>
            <a href="visualization.html" class="nav-item"><i data-feather="map"></i> Visualization</a>
            <a href="reports.html" class="nav-item"><i data-feather="file-text"></i> Reports</a>
            <a href="analysis.html" class="nav-item"><i data-feather="zap"></i> Analysis</a>
            <a href="tests.html" class="nav-item"><i data-feather="check-circle"></i> Tests</a>
            <a href="vps.html" class="nav-item active"><i data-feather="server"></i> VPS</a>
            <a href="documentation.html" class="nav-item"><i data-feather="book-open"></i> Documentation</a>
        </nav>
    </div>
    <div class="main">
        <div class="breadcrumb"><a href="index.html" style="color:inherit; text-decoration:none;">AVRY</a> / VPS ANALYSIS</div>
        <h1 style="margin:0; font-weight: 300; letter-spacing: 1px;">VPS Infrastructure</h1>
        <p style="color: #555; font-size: 14px; margin-top: 10px;">Diagnostic logs and deployment configurations for the VPS bridge network.</p>
        
        <div class="grid" id="vps-grid"></div>
    </div>
    <script>
        async function loadVPS() {
            const resp = await fetch('data/docs.json');
            const data = await resp.json();
            const grid = document.getElementById('vps-grid');
            
            data.filter(d => d.category === 'VPS').forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.open(`data/vault/${item.path}`, '_blank');
                card.innerHTML = `
                    <div class="tag">INFRA</div>
                    <h3 title="${item.name}">${item.name}</h3>
                    <p>Configuration and diagnostic data for infrastructure stability.</p>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 11px; color: #444;">${item.path}</span>
                        <i data-feather="external-link" style="width: 14px; height: 14px; color: var(--accent);"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
            feather.replace();
        }
        loadVPS();
    </script>
</body>
</html>
