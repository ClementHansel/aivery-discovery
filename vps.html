<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analysis | AVRY Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #14161e; --accent: #00f2ff; --text: #e0e0e0; --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--panel); border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .nav-item { padding: 12px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 14px; border-radius: 8px; margin-bottom: 8px; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
        .doc-card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .doc-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .doc-card h3 { margin: 0 0 10px; font-size: 16px; color: #fff; }
        .doc-card p { font-size: 12px; color: #555; margin: 0; word-break: break-all; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); font-weight: 300; letter-spacing: 2px;">AVRY</h2>
        <nav style="margin-top: 40px;">
            <a href="index.html" class="nav-item"><i data-feather="grid"></i> Dashboard</a>
            <a href="reports.html" class="nav-item" id="nav-Report"><i data-feather="file-text"></i> Reports</a>
            <a href="analysis.html" class="nav-item" id="nav-Analysis"><i data-feather="zap"></i> Analysis</a>
            <a href="vps.html" class="nav-item" id="nav-VPS"><i data-feather="server"></i> VPS</a>
            <a href="documentation.html" class="nav-item" id="nav-Documentation"><i data-feather="book-open"></i> Documentation</a>
            <a href="tests.html" class="nav-item"><i data-feather="check-circle"></i> Tests</a>
            <a href="visualization.html" class="nav-item"><i data-feather="map"></i> Visualization</a>
        </nav>
    </div>
    <div class="main">
        <h1 id="page-title">...</h1>
        <p id="page-desc" style="color: #666;">Explore system insights and documentation.</p>
        <div class="grid" id="doc-grid"></div>
    </div>
    <script>
        const path = window.location.pathname;
        let type = "Report";
        if (path.includes('analysis')) type = "Analysis";
        else if (path.includes('vps')) type = "VPS";
        else if (path.includes('documentation')) type = "Documentation";

        document.getElementById('page-title').innerText = type;
        document.getElementById(`nav-${type}`).classList.add('active');

        async function loadDocs() {
            const resp = await fetch('data/reports.json');
            const docs = await resp.json();
            const grid = document.getElementById('doc-grid');
            const filtered = docs.filter(d => d.type === type);
            
            if (filtered.length === 0) grid.innerHTML = '<p style="color:#444">No documents found in this category.</p>';

            filtered.forEach(d => {
                const card = document.createElement('div');
                card.className = 'doc-card';
                card.onclick = () => window.open(`data/vault/${d.path}`, '_blank');
                card.innerHTML = `<div style="color:var(--accent); margin-bottom:12px;"><i data-feather="file"></i></div><h3>${d.name}</h3><p>${d.path}</p>`;
                grid.appendChild(card);
            });
            feather.replace();
        }
        loadDocs();
    </script>
</body>
</html>
