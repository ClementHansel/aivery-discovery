<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization | AVRY Discovery</title>
    <script src="assets/lib/d3.v7.min.js"></script>
    <link rel="stylesheet" href="assets/lib/prism.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/discovery.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .top-bar { padding: 16px 24px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .vis-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        #view-content { flex: 1; position: relative; background: #020305; }
        #canvas, #tree-view { width: 100%; height: 100%; position: absolute; }
        #tree-view { overflow: auto; padding: 40px; display: none; background: var(--bg); }

        .inspector { width: var(--inspector-width); background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .inspector-body { flex: 1; overflow-y: auto; padding: 32px; scroll-behavior: smooth; }

        .inspector-body h3 { font-family: 'Inter', sans-serif; letter-spacing: -0.5px; }
        .inspector-body details { margin-bottom: 24px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; }
        .inspector-body details[open] { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
        .inspector-body summary { padding: 16px; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); font-weight: 600; list-style: none; display: flex; align-items: center; justify-content: space-between; }
        .inspector-body summary::after { content: '+'; font-size: 14px; opacity: 0.5; }
        .inspector-body details[open] summary::after { content: '−'; }
        .details-content { padding: 0 16px 20px; line-height: 1.6; }

        #code-modal { position: fixed; top: 0; right: 0; width: 70%; height: 100%; background: #050608; border-left: 1px solid var(--accent); transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; box-shadow: -20px 0 60px rgba(0,0,0,0.8); }
        #code-modal.open { transform: translateX(0); }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        /* Tree Styles */
        .tree-node { cursor: pointer; padding: 8px 12px; border-radius: 6px; font-size: 13px; display: flex; align-items: center; color: var(--text-dim); transition: 0.2s; }
        .tree-node:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .tree-indent { border-left: 1px solid var(--border); margin-left: 18px; padding-left: 10px; }

        /* Node/Link */
        .node { cursor: pointer; stroke-width: 2px; stroke: rgba(0,0,0,0.3); transition: r 0.3s, fill 0.3s; }
        .link { stroke-opacity: 0.1; stroke: #555; transition: stroke-opacity 0.3s, stroke 0.3s; }
        .node-label { fill: #888; font-size: 10px; pointer-events: none; font-weight: 400; }
        .rel-card:hover { background: rgba(0, 242, 255, 0.05) !important; transform: translateX(5px); }
    </style>
</head>
<body>
    <div id="app-container">
        <main class="main-content">
            <div class="top-bar">
                <div class="lens-group">
                    <button class="lens-btn active" onclick="setLens('File')"><i data-feather="folder"></i> Files</button>
                    <button class="lens-btn" onclick="setLens('Feature')"><i data-feather="layout"></i> Pages</button>
                    <button class="lens-btn" onclick="setLens('Service')"><i data-feather="cpu"></i> Services</button>
                    <button class="lens-btn" onclick="setLens('Flow')"><i data-feather="activity"></i> Flows</button>
                    <button class="lens-btn" onclick="setLens('DB Table')"><i data-feather="database"></i> DB</button>
                    <button class="lens-btn" onclick="setLens('API')"><i data-feather="share-2"></i> API</button>
                </div>
                
                <div class="vis-toggle-group">
                    <button class="lens-btn active" id="btn-visual" onclick="switchView('visual')"><i data-feather="globe"></i> Graph</button>
                    <button class="lens-btn" id="btn-tree" onclick="switchView('tree')"><i data-feather="list"></i> Tree</button>
                </div>
            </div>

            <div id="loading-overlay">
                <div class="spinner"></div>
                <p style="color:var(--text-dim); font-size:12px; letter-spacing:1px; text-transform:uppercase;">Initializing Neural Graph...</p>
            </div>

            <div id="spectrum-legend" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.6); padding:12px; border-radius:8px; border:1px solid var(--border); font-size:10px; z-index:100; backdrop-filter:blur(4px); display:flex; flex-direction:column; gap:8px;">
                <div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:#61dafb;"></span> Frontend / Pages</div>
                <div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:#3c873a;"></span> Backend / Scripts</div>
                <div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:#ffd32a;"></span> Services / Logic</div>
                <div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:#f29111;"></span> Database Tables</div>
                <div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:#a29bfe;"></span> API Endpoints</div>
                <div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:#05c46b;"></span> Workflow Flows</div>
            </div>

            <div class="vis-container">
                <div id="view-content">
                    <div id="canvas"></div>
                    <div id="tree-view"></div>
                </div>

                <aside class="inspector">
                    <div class="inspector-body">
                        <div id="welcome-msg" style="text-align:center; color:var(--text-dim); margin-top:100px;">
                            <i data-feather="info" style="width:48px; height:48px; margin-bottom:20px; opacity:0.3;"></i>
                            <p>Select a node to inspect its neural architecture and functional purpose.</p>
                        </div>
                        <div id="node-details" style="display:none;">
                            <h3 id="det-name" style="color:var(--accent); margin:0 0 15px; font-weight:600; font-size:18px;"></h3>
                            
                            <span style="font-size:10px; text-transform:uppercase; color:var(--text-dim); letter-spacing:1px; margin-bottom:8px; display:block;">File Address</span>
                            <div class="path-box" id="det-path"></div>
                            
                            <details open>
                                <summary>Functional Purpose</summary>
                                <div id="det-purpose" class="details-content"></div>
                            </details>
                            
                            <details open style="margin-top:15px;">
                                <summary>Architectural Logic</summary>
                                <div id="det-logic" class="details-content" style="font-family:'Fira Code'; font-size:11px; color: #999;"></div>
                            </details>

                            <details style="margin-top:15px;">
                                <summary>Related Components</summary>
                                <div id="det-related" style="padding:10px;"></div>
                            </details>

                            <button class="lens-btn" style="width:100%; margin-top:30px; justify-content:center; border-color:var(--accent); color:var(--accent);" id="btn-open-code">
                                <i data-feather="code"></i> Open Code & Insights
                            </button>
                        </div>
                    </div>
                    <div style="padding:16px 24px; border-top:1px solid var(--border); background:rgba(0,0,0,0.2);">
                        <input type="text" id="search-input" placeholder="🔍 Search components..." style="width:100%; background:#000; border:1px solid var(--border); color:white; padding:12px; border-radius:8px; outline:none; font-size:14px;">
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <script src="assets/lib/prism.js"></script>
    <script src="assets/lib/prism-python.min.js"></script>
    <script src="assets/js/discovery.js"></script>
    <script>
        let graphData = null, simulation, link, node, label, activeLens = 'File', primaryIds = new Set();
        const canvasContainer = document.getElementById('view-content');
        const overlay = document.getElementById('loading-overlay');
        
        async function init() {
            try {
                overlay.style.opacity = '1';
                overlay.style.display = 'flex';
                
                const resp = await fetch('data/graph.json');
                graphData = await resp.json();
                
                // Allow UI to render the overlay before heavy processing
                setTimeout(() => {
                    renderVisual();
                    renderTree(graphData.tree || {name:"AVRY Root", children:[]}, document.getElementById('tree-view'));
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 500);
                }, 300);
            } catch (e) {
                console.error("Fetch error:", e);
                overlay.style.display = 'none';
                document.getElementById('welcome-msg').innerHTML = `
                    <div style="padding:20px; color:#ff4444; border:1px solid #ff4444; border-radius:8px; font-size:13px;">
                        <strong>Security Error:</strong> Browsers block local file access for security.<br><br>
                        Please run <code>python serve_discovery.py</code> to view the dashboard correctly.
                    </div>`;
            }
        }

        function renderVisual() {
            if (!graphData) return;
            const w = canvasContainer.clientWidth;
            const h = canvasContainer.clientHeight;
            d3.select("#canvas").selectAll("*").remove();
            const svg = d3.select("#canvas").append("svg").attr("width", w).attr("height", h);
            const g = svg.append("g");
            
            const zoom = d3.zoom().scaleExtent([0.05, 5]).on("zoom", (e) => g.attr("transform", e.transform));
            svg.call(zoom);

            // Filter logic
            const filteredNodes = graphData.nodes.filter(n => activeLens === 'File' || n.category === activeLens);
            primaryIds = new Set(filteredNodes.map(n => n.id));
            
            // Show connections for specialized tabs
            const showConnections = true; // Always show connections for context
            
            let visibleNodes, visibleLinks;
            if (showConnections && activeLens !== 'File') {
                visibleNodes = graphData.nodes.filter(n => primaryIds.has(n.id) || graphData.links.some(l => {
                    const s = l.source.id || l.source;
                    const t = l.target.id || l.target;
                    return (s === n.id && primaryIds.has(t)) || (t === n.id && primaryIds.has(s));
                }));
                const visibleIds = new Set(visibleNodes.map(n => n.id));
                visibleLinks = graphData.links.filter(l => {
                    const s = l.source.id || l.source;
                    const t = l.target.id || l.target;
                    return visibleIds.has(s) && visibleIds.has(t);
                });
            } else if (activeLens === 'File') {
                // For files, show all files but only their direct connections
                visibleNodes = filteredNodes;
                visibleLinks = graphData.links.filter(l => {
                    const s = l.source.id || l.source;
                    const t = l.target.id || l.target;
                    return primaryIds.has(s) && primaryIds.has(t);
                });
            } else {
                visibleNodes = filteredNodes;
                visibleLinks = [];
            }

            // Optimize simulation
            simulation = d3.forceSimulation(visibleNodes)
                .force("link", d3.forceLink(visibleLinks).id(d => d.id).distance(150))
                .force("charge", d3.forceManyBody().strength(-400))
                .force("center", d3.forceCenter(w/2, h/2))
                .force("collision", d3.forceCollide().radius(50))
                .velocityDecay(0.3);

            link = g.append("g").selectAll("line").data(visibleLinks).join("line").attr("class", "link")
                .style("stroke-opacity", activeLens === 'File' ? 0.3 : 0.6);
            
            node = g.append("g").selectAll("circle").data(visibleNodes).join("circle")
                .attr("class", "node")
                .attr("r", d => primaryIds.has(d.id) ? 10 : 6)
                .attr("fill", d => {
                    const cat = d.category || '';
                    const labelStr = d.label || '';
                    if (cat === 'DB Table') return '#f29111'; // Orange
                    if (cat === 'API') return '#a29bfe'; // Purple
                    if (cat === 'Service') return '#ffd32a'; // Yellow
                    if (cat === 'Flow') return '#05c46b'; // Green
                    if (cat === 'Feature') return '#ef5777'; // Pink
                    
                    if (d.layer === 'FE' || labelStr.includes('.tsx') || labelStr.includes('.html') || labelStr.includes('.css')) return '#61dafb'; // Cyan
                    if (d.layer === 'BE' || labelStr.includes('.py') || labelStr.includes('.sh') || labelStr.includes('.js')) return '#3c873a'; // Green-ish
                    return '#555';
                })
                .style("opacity", d => primaryIds.has(d.id) ? 1 : 0.3)
                .call(d3.drag().on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

            label = g.append("g").selectAll("text").data(visibleNodes.filter(n => primaryIds.has(n.id) || visibleNodes.length < 50)).join("text")
                .attr("class", "node-label")
                .attr("dy", 22).attr("text-anchor", "middle")
                .style("opacity", d => primaryIds.has(d.id) ? 1 : 0.5)
                .text(d => {
                    let name = d.label.split('/').pop();
                    if (name === 'page.tsx' || name === 'index.js' || name === 'page.js') {
                        const parts = d.label.split('/');
                        if (parts.length > 1) name = parts[parts.length - 2];
                    }
                    return name;
                });

            node.on("click", (e, d) => { e.stopPropagation(); selectNode(d); });
            svg.on("click", () => resetSelection());

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                label.attr("x", d => d.x).attr("y", d => d.y);
            });
        }

        function resetSelection() {
            link.transition().duration(300).style("stroke-opacity", 0.1).style("stroke", "#555").style("stroke-width", 1);
            node.transition().duration(300).style("opacity", n => primaryIds.has(n.id) ? 1 : 0.2).attr("r", n => primaryIds.has(n.id) ? 8 : 5);
            document.getElementById('welcome-msg').style.display = 'block';
            document.getElementById('node-details').style.display = 'none';
        }

        function switchView(v) {
            document.getElementById('btn-visual').classList.toggle('active', v === 'visual');
            document.getElementById('btn-tree').classList.toggle('active', v === 'tree');
            document.getElementById('canvas').style.display = v === 'visual' ? 'block' : 'none';
            document.getElementById('tree-view').style.display = v === 'tree' ? 'block' : 'none';
        }

        function setLens(l) {
            activeLens = l;
            document.querySelectorAll('.lens-group .lens-btn').forEach(b => b.classList.toggle('active', b.innerText.trim().includes(l)));
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
            setTimeout(() => {
                renderVisual();
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }, 300);
        }

        function selectNode(d) {
            if (!d) return;
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('node-details').style.display = 'block';
            
            const fileName = d.label.split('/').pop();
            document.getElementById('det-name').innerText = fileName;
            document.getElementById('det-path').innerText = d.source_file || d.id || 'N/A';
            
            // Refine display
            document.getElementById('det-purpose').innerHTML = `<p style="margin:0; font-size:13px; color:var(--text);">${d.functionDesc || "Standard architectural component of the AVRY ecosystem."}</p>`;
            document.getElementById('det-logic').innerHTML = `<p style="margin:0; font-family:'Inter'; font-size:13px; color:#999; line-height:1.5;">${d.detailedLogic || "Encapsulated logic following modular design patterns."}</p>`;
            
            // Highlight connections
            link.transition().duration(300)
                .style("stroke-opacity", l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id ? 0.8 : 0.05)
                .style("stroke", l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id ? "var(--accent)" : "#555")
                .style("stroke-width", l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id ? 2 : 1);
            
            node.transition().duration(300)
                .style("opacity", n => n.id === d.id ? 1 : 0.2)
                .attr("r", n => n.id === d.id ? 12 : (['Service', 'Flow', 'DB Table', 'API', 'Feature'].includes(activeLens) && graphData.nodes.filter(nn => nn.category === activeLens).some(nn => nn.id === n.id) ? 8 : 5));

            const related = graphData.links.filter(l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id);
            const relBox = document.getElementById('det-related');
            relBox.innerHTML = "";
            
            if (related.length === 0) relBox.innerHTML = "<p style='font-size:11px; color:#444;'>No direct relations detected.</p>";
            
            related.forEach(l => {
                const otherId = (l.source.id || l.source) === d.id ? (l.target.id || l.target) : (l.source.id || l.source);
                const other = graphData.nodes.find(n => n.id === otherId);
                if (other) {
                    const rDiv = document.createElement('div');
                    rDiv.className = 'rel-card';
                    rDiv.style = "padding:12px; background:rgba(255,255,255,0.03); border-radius:8px; margin-bottom:10px; cursor:pointer; font-size:12px; border:1px solid var(--border); display:flex; align-items:center; gap:12px; transition:0.2s;";
                    
                    const icon = other.category === 'DB Table' ? 'database' : other.category === 'API' ? 'share-2' : 'file';
                    rDiv.innerHTML = `<i data-feather="${icon}" style="width:14px; height:14px; color:var(--accent); opacity:0.7;"></i> <span>${other.label.split('/').pop()}</span>`;
                    
                    rDiv.onmouseover = () => rDiv.style.borderColor = 'var(--accent)';
                    rDiv.onmouseout = () => rDiv.style.borderColor = 'var(--border)';
                    rDiv.onclick = (e) => {
                        e.stopPropagation();
                        selectNode(other);
                        // Focus visual node
                        const visualNode = node.filter(n => n.id === other.id);
                        if (!visualNode.empty()) {
                            visualNode.dispatch('click');
                        }
                    };
                    relBox.appendChild(rDiv);
                }
            });
            
            document.getElementById('btn-open-code').onclick = () => openCode(d.source_file);
            feather.replace();
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (!term) {
                node.style("opacity", d => ['Service', 'Flow', 'DB Table', 'API', 'Feature'].includes(activeLens) ? (graphData.nodes.filter(n => n.category === activeLens).some(n => n.id === d.id) ? 1 : 0.2) : 1);
                label.style("opacity", 1);
                return;
            }
            node.style("opacity", d => d.label.toLowerCase().includes(term) || (d.source_file && d.source_file.toLowerCase().includes(term)) ? 1 : 0.05);
            label.style("opacity", d => d.label.toLowerCase().includes(term) ? 1 : 0);
        });

        async function openCode(p) {
            if (!p) return;
            injectModal();
            const resp = await fetch(`data/vault/${p}`);
            const code = await resp.text();
            document.getElementById('modal-title').innerText = p;
            const codeBox = document.getElementById('code-box');
            codeBox.textContent = code;
            document.getElementById('modal').style.display = 'block';
            if (typeof Prism !== 'undefined') Prism.highlightElement(codeBox);
            feather.replace();
        }

        function closeModal_vis() { 
            const m = document.getElementById('modal');
            if (m) m.style.display = 'none';
        }

        function renderTree(item, container, depth=0) {
            if (!item) return;
            const div = document.createElement('div');
            div.className = 'tree-node';
            div.innerHTML = `<span style="opacity:0.5; margin-right:10px;">${item.children&&item.children.length?'⊞':'📄'}</span> ${item.name}`;
            if (item.id) {
                div.style.color = 'var(--accent)';
                div.onclick = (e) => { e.stopPropagation(); selectNode(graphData.nodes.find(n => n.id === item.id)); };
            }
            container.appendChild(div);
            if (item.children && item.children.length) {
                const indent = document.createElement('div');
                indent.className = 'tree-indent';
                indent.style.display = depth < 1 ? 'block' : 'none';
                item.children.forEach(c => renderTree(c, indent, depth + 1));
                container.appendChild(indent);
                div.onclick = () => {
                    const h = indent.style.display === 'none';
                    indent.style.display = h ? 'block' : 'none';
                    div.querySelector('span').innerText = h ? '⊟' : '⊞';
                };
            }
        }

        init();
    </script>
</body>
</html>
