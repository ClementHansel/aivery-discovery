<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tests | AVRY Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/lib/prism.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #14161e; --accent: #00f2ff; --text: #e0e0e0; --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .breadcrumb { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 20px; }
        .breadcrumb a { color: inherit; text-decoration: none; }
        .nav-item { padding: 12px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; border-radius: 8px; margin-bottom: 4px; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { text-align: left; padding: 15px; color: #444; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); letter-spacing: 1px; }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        .test-link { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 500; }
        .status-pill { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 600; background: rgba(0, 255, 127, 0.05); color: #00ff7f; border: 1px solid rgba(0, 255, 127, 0.2); }

        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; z-index: 1000; }
        .modal-content { width: 85%; height: 85%; margin: 4% auto; background: var(--panel); border-radius: 16px; display: flex; flex-direction: column; border: 1px solid var(--border); box-shadow: 0 30px 100px rgba(0,0,0,0.8); }
        .modal-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow: auto; padding: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); font-weight: 300; letter-spacing: 3px; font-size: 20px; margin-bottom: 40px;">AVRY</h2>
        <nav>
            <a href="index.html" class="nav-item"><i data-feather="grid"></i> Dashboard</a>
            <div style="margin: 20px 0 10px 12px; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px;">Modules</div>
            <a href="reports.html" class="nav-item"><i data-feather="file-text"></i> Reports</a>
            <a href="analysis.html" class="nav-item"><i data-feather="zap"></i> Analysis</a>
            <a href="vps.html" class="nav-item"><i data-feather="server"></i> VPS</a>
            <a href="documentation.html" class="nav-item"><i data-feather="book-open"></i> Documentation</a>
            <a href="tests.html" class="nav-item active"><i data-feather="check-circle"></i> Tests</a>
            <a href="visualization.html" class="nav-item"><i data-feather="map"></i> Visualization</a>
        </nav>
    </div>

    <div class="main">
        <div class="breadcrumb"><a href="index.html">AVRY</a> / TESTS</div>
        <h1 style="margin:0; font-weight: 300; letter-spacing: 1px;">Test Verification Suite</h1>
        <p style="color: #555; font-size: 14px; margin-top: 10px;">Validating system integrity through AI-annotated architectural test logic.</p>

        <table id="test-table">
            <thead>
                <tr>
                    <th>Test Module</th>
                    <th>Architectural Context</th>
                    <th>Result</th>
                    <th>Last Modified</th>
                </tr>
            </thead>
            <tbody id="test-body"></tbody>
        </table>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin:0; font-family: 'Fira Code'; font-size: 14px; color: var(--accent);"></h3>
                <button onclick="closeModal()" style="background: none; border: none; color: #555; cursor: pointer; transition: 0.2s;"><i data-feather="x"></i></button>
            </div>
            <div class="modal-body">
                <pre><code id="code-box" class="language-python"></code></pre>
            </div>
        </div>
    </div>

    <script src="assets/lib/prism.js"></script>
    <script src="assets/lib/prism-python.min.js"></script>
    <script>
        async function loadTests() {
            const resp = await fetch('data/tests.json');
            const tests = await resp.json();
            const body = document.getElementById('test-body');
            
            tests.forEach(t => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a class="test-link" onclick="openCode('${t.name}')">${t.name}</a></td>
                    <td style="color: #888;">${t.description}</td>
                    <td><span class="status-pill">PASSED</span></td>
                    <td style="color: #444; font-size: 12px;">${t.timestamp}</td>
                `;
                body.appendChild(tr);
            });
            feather.replace();
        }

        async function openCode(path) {
            const resp = await fetch(`data/vault/${path}`);
            const code = await resp.text();
            document.getElementById('modal-title').innerText = path;
            const codeBox = document.getElementById('code-box');
            codeBox.textContent = code;
            document.getElementById('modal').style.display = 'block';
            Prism.highlightElement(codeBox);
            feather.replace();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        loadTests();
        feather.replace();
    </script>
</body>
</html>
