<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Docs | AVRY Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #14161e; --accent: #00f2ff; --text: #e0e0e0; --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .breadcrumb { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 20px; }
        .nav-item { padding: 12px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; border-radius: 8px; margin-bottom: 4px; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); font-weight: 600; }
        .category-section { margin-top: 30px; }
        .category-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #444; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 20px; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .doc-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 25px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .doc-card:hover { border-color: var(--accent); transform: translateY(-3px); background: rgba(0,242,255,0.03); }
        .doc-name { margin: 0 0 10px; font-size: 14px; color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .doc-path { font-size: 10px; color: #444; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); font-weight: 300; letter-spacing: 3px; font-size: 20px; margin-bottom: 40px;">AVRY</h2>
        <nav>
            <a href="index.html" class="nav-item"><i data-feather="grid"></i> Dashboard</a>
            <div style="margin: 20px 0 10px 12px; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px;">Modules</div>
            <a href="visualization.html" class="nav-item"><i data-feather="map"></i> Visualization</a>
            <a href="documentation.html" class="nav-item" id="nav-Documentation"><i data-feather="book-open"></i> Documentation</a>
            <a href="tests.html" class="nav-item"><i data-feather="check-circle"></i> Tests</a>
            <a href="analysis.html" class="nav-item" id="nav-Analysis"><i data-feather="zap"></i> Analysis</a>
            <a href="reports.html" class="nav-item" id="nav-Reports"><i data-feather="file-text"></i> Reports</a>
        </nav>
    </div>
    <div class="main">
        <div class="breadcrumb"><a href="index.html" style="color:inherit; text-decoration:none;">AVRY</a> / <span id="bread-current">...</span></div>
        <h1 id="page-title" style="margin:0; font-weight: 300; letter-spacing: 1px;">...</h1>
        <p style="color: #555; font-size: 14px; margin-top: 10px;">Real-time architectural data extracted directly from the system architecture.</p>
        <div id="docs-container"></div>
    </div>
    <script>
        const path = window.location.pathname;
        let viewType = "Documentation";
        if (path.includes('analysis')) viewType = "Analysis";
        else if (path.includes('reports')) viewType = "Reports";

        document.getElementById('page-title').innerText = viewType === "Documentation" ? "System Documentation" : (viewType === "Analysis" ? "Architectural Analysis" : "System Reports");
        document.getElementById('bread-current').innerText = viewType.toUpperCase();
        document.getElementById(`nav-${viewType}`).classList.add('active');

        async function loadDocs() {
            const resp = await fetch('data/docs.json');
            const docs = await resp.json();
            const container = document.getElementById('docs-container');
            
            const cats = {};
            docs.forEach(d => {
                if (viewType === "Documentation" || d.category === viewType || (viewType === "Reports" && d.category === "Reports")) {
                    if (!cats[d.category]) cats[d.category] = [];
                    cats[d.category].push(d);
                }
            });

            Object.keys(cats).sort().forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<span class="category-label">${cat}</span><div class="grid"></div>`;
                const grid = section.querySelector('.grid');
                cats[cat].forEach(d => {
                    const card = document.createElement('div');
                    card.className = 'doc-card';
                    card.onclick = () => window.open(`data/vault/${d.path}`, '_blank');
                    card.innerHTML = `<div style="color:var(--accent); margin-bottom:12px; opacity:0.6;"><i data-feather="file" style="width:16px;"></i></div><h3 class="doc-name" title="${d.name}">${d.name}</h3><p class="doc-path" title="${d.path}">${d.path}</p>`;
                    grid.appendChild(card);
                });
                container.appendChild(section);
            });
            feather.replace();
        }
        loadDocs();
    </script>
</body>
</html>
